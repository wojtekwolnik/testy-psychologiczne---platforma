server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
- job_name: containers
  static_configs:
    - targets:
        - localhost
      labels:
        job: container-logs
        __path__: /var/log/docker/containers/*/*-json.log
  pipeline_stages:
  - json:
      expressions:
        output: log
        stream: stream
        attrs: attrs
  - json:
      expressions:
        app: "attrs.container_name"
      source: attrs
  - labels:
      app:
