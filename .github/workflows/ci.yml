name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Prepare environment variables
      run: |
        echo "JWT_SECRET=super_secret_ci_key_for_testing" > .env
        echo "JWT_SECRET=super_secret_ci_key_for_testing" > .env.test

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run ESLint
      run: npm run lint

    - name: Run Tests
      run: npm test

    - name: Build Next.js application
      run: npm run build
